name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # Leave VITE_BACKEND_URL unset so the /api/backend Firebase Hosting
          # rewrite is used — same-origin, no CORS, survives org IAM policy.
          VITE_BACKEND_URL: ""

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/352830294101/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-github-actions@ukrainianrestoration-50993.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API proxy to App Engine
        run: gcloud app deploy proxy/app.yaml --project=ukrainianrestoration-50993 --quiet
        continue-on-error: true

      - name: Deploy Firestore rules and indexes
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project ukrainianrestoration-50993
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules
        run: npx firebase deploy --only storage --project ukrainianrestoration-50993
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firebase Hosting
        run: |
          set +e
          npx firebase deploy --only hosting --project ukrainianrestoration-50993 2>&1 | tee /tmp/firebase-hosting.log
          EXIT=${PIPESTATUS[0]}
          set -e
          if grep -q "current active version" /tmp/firebase-hosting.log; then
            echo "Version already live — no content changes, skipping release."
            exit 0
          fi
          exit $EXIT
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
