name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Staging ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Staging build: no VITE_BACKEND_URL — falls back to /api/backend, which
      # Firebase Hosting rewrites to myclaim-backend-staging via firebase.staging.json.
      - name: Build (staging)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/352830294101/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-github-actions@ukrainianrestoration-50993.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase staging channel
        run: |
          npx firebase hosting:channel:deploy staging \
            --config firebase.staging.json \
            --project ukrainianrestoration-50993 \
            --expires 30d

      - name: Deploy Firestore rules and indexes
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project ukrainianrestoration-50993
        continue-on-error: true

      - name: Deploy Storage rules
        run: npx firebase deploy --only storage --project ukrainianrestoration-50993
        continue-on-error: true

  # ─── Production ──────────────────────────────────────────────────────────────
  # Requires manual approval in GitHub → Settings → Environments → production.
  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # App Engine proxy at this URL fetches a Cloud Run identity token
          # and forwards requests — org-policy safe, supports streaming SSE.
          VITE_BACKEND_URL: https://ukrainianrestoration-50993.uc.r.appspot.com/api/backend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/352830294101/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-github-actions@ukrainianrestoration-50993.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API proxy to App Engine
        run: gcloud app deploy proxy/app.yaml --project=ukrainianrestoration-50993 --quiet
        continue-on-error: true

      - name: Deploy Firebase Hosting
        run: |
          set +e
          npx firebase deploy --only hosting --project ukrainianrestoration-50993 2>&1 | tee /tmp/firebase-hosting.log
          EXIT=${PIPESTATUS[0]}
          set -e
          if grep -q "current active version" /tmp/firebase-hosting.log; then
            echo "Version already live — no content changes, skipping release."
            exit 0
          fi
          exit $EXIT
