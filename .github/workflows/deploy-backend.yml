name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/352830294101/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-github-actions@ukrainianrestoration-50993.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push container
        run: |
          docker build -t gcr.io/ukrainianrestoration-50993/myclaim-backend:${{ github.sha }} backend/
          docker push gcr.io/ukrainianrestoration-50993/myclaim-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy myclaim-backend \
            --image gcr.io/ukrainianrestoration-50993/myclaim-backend:${{ github.sha }} \
            --region us-east1 \
            --project ukrainianrestoration-50993 \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "^|^CORS_ORIGINS=https://ukrainianrestoration.com,https://www.ukrainianrestoration.com,https://ukrainianrestoration-50993.web.app,https://ukrainianrestoration-50993.firebaseapp.com,http://localhost:5173,http://localhost:5174,http://localhost:5175" \
            --update-env-vars "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            --update-env-vars "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            --update-env-vars "TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}" \
            --update-env-vars "FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" \
            --update-env-vars "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --update-env-vars "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --update-env-vars "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
            --update-env-vars "AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
            --update-env-vars "OPENSIGN_APP_ID=${{ secrets.OPENSIGN_APP_ID }}" \
            --update-env-vars "OPENSIGN_REST_KEY=${{ secrets.OPENSIGN_REST_KEY }}" \
            --update-env-vars "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" \
            --set-secrets "GOOGLE_CLIENT_SECRETS_JSON=google-drive-client-secret:latest"
