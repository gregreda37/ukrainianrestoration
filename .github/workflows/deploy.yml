name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # VITE_BACKEND_URL intentionally omitted — production always routes through
          # Firebase Hosting (/api/backend) so the frontend uses the same-origin path.

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      # WIF auth — sets GOOGLE_APPLICATION_CREDENTIALS for all subsequent steps.
      # firebase-tools v15 uses google-auth-library which reads ADC natively,
      # so no FIREBASE_TOKEN or service account key is needed.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/352830294101/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-github-actions@ukrainianrestoration-50993.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Firebase Hosting
        run: |
          set +e
          OUTPUT=$(npx firebase-tools deploy --only hosting --project ukrainianrestoration-50993 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          # A 400 "already active version" means the content is unchanged and
          # the current live version is already correct — treat as success.
          if [ $STATUS -ne 0 ] && echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "Hosting already up to date — skipping release."
            exit 0
          fi
          exit $STATUS

      # Functions must be deployed via firebase-tools to register them with Firebase
      # infrastructure so Hosting rewrites can invoke them via the service agent.
      # firebase-github-actions SA has roles/firebase.admin, which allows WIF ADC
      # to work for both hosting and functions deploy without a FIREBASE_TOKEN.
      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project ukrainianrestoration-50993
